# configs/base_config.yaml
# Default static configuration.

data:
  block_size: 128
  tokenizer_type: "tiktoken_gpt2"

model:
  type: "GPT"
  params:
    vocab_size: __VOCAB_SIZE__  # Placeholder: To be filled by DataProcessor.
    block_size: 128
    bias: true

trainer:
  device: "cuda"
  dtype: "bfloat16"
  max_iters: 5000
  eval_interval: 250
  eval_iters: 100
  log_interval: 10
  gradient_accumulation_steps: 32
  
optimizer:
  type: "AdamW"
  params:
    weight_decay: 0.1
    beta1: 0.9
    beta2: 0.95
    eps: 1.0e-8

scheduler:
  type: "CosineDecayWithWarmup"
  params:
    warmup_iters: 500
